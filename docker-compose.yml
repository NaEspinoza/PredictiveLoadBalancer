version: '3.8'
services:
  lb:
    build: ./lb
    container_name: predictive-sentinel-lb
    ports:
      - "8080:8080"
    environment:
      - LB_PORT=8080
      - LB_HEALTHCHECK_PATH=/health
      - BACKEND1=${BACKEND1:-http://backend1:9001}
      - BACKEND2=${BACKEND2:-http://backend2:9002}
      - BACKEND3=${BACKEND3:-http://backend3:9003}
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build:
      context: ./backend
    container_name: backend1
    environment:
      - PORT=9001
      - SIMULATED_LATENCY_MS=50

  backend2:
    build:
      context: ./backend
    container_name: backend2
    environment:
      - PORT=9002
      - SIMULATED_LATENCY_MS=200

  backend3:
    build:
      context: ./backend
    container_name: backend3
    environment:
      - PORT=9003
      - SIMULATED_LATENCY_MS=500

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
