name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Download dependencies
        run: |
          cd lb
          go mod tidy
      - name: Run tests
        run: |
          cd lb
          go test ./...
